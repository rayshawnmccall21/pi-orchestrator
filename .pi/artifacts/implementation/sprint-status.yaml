sprint:
  id: sprint-2
  name: "Wire Real Orchestration"
  goal: "Make orchestrate start actually dispatch pi-bmad workers via workerPool.provision() and log typed HeadlessWorkflowOutput results to JSONL"
  status: active

stories:
  - id: wire-real-dispatch
    title: "Wire orchestrate start to spawn headless pi-bmad workers and collect typed results"
    status: planned
    priority: 1
    description: >
      The orchestrate tool's start action sets a boolean but doesn't dispatch work.
      The run controller needs to call workerPool.provision() which calls 
      createSpawnWorkerPool's provision() — creating a git worktree and spawning 
      a headless pi process. The spawn callback already parses HeadlessWorkflowOutput 
      and emits events. The run controller just needs to: (1) call stateManager.apply 
      to set status running, (2) call workerPool.provision with workflow config,
      (3) register onWorkerDone callback to log results and transition FSM state.
    files:
      - src/run/controller/index.ts
      - src/bootstrap.ts
      - src/actions.ts
